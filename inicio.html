<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Bienvenido</h1>
            <p>Inicia sesión en tu cuenta</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="tu@email.com" 
                    required
                >
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Ingresa tu contraseña" 
                    required
                >
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox" name="remember" id="remember">
                    Recuérdame
                </label>
                <a href="#forgot">¿Olvidaste la contraseña?</a>
            </div>

            <button type="submit" class="login-btn">Iniciar Sesión</button>

            <div class="success-message" id="successMessage">
                ¡Sesión iniciada correctamente!
            </div>
        </form>

        <div class="divider">o</div>

        <div class="social-login">
            <button type="button" class="social-btn" title="Inicia sesión con Google">
                <span>Google</span>
            </button>
            <button type="button" class="social-btn" title="Inicia sesión con Facebook">
                <span>Facebook</span>
            </button>
        </div>

        <div class="signup-link">
            ¿No tienes cuenta? <a href="#signup">Regístrate aquí</a>
        </div>
    </div>

    <script src="login.js" defer></script>
</body>
</html>
